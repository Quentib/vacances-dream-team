<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🌴 Vacances Dream Team</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(160deg, #0a0a0a 0%, #1a1a2e 40%, #16213e 70%, #0f3460 100%);
      min-height: 100vh; padding: 32px 16px 60px; color: #fff;
    }
    .hero { text-align: center; margin-bottom: 40px; }
    .hero h1 {
      font-size: 2.4rem; font-weight: 900; letter-spacing: 2px;
      background: linear-gradient(90deg, #ff6b6b, #ffd93d, #6bcb77, #4d96ff);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; margin-bottom: 8px;
    }
    .hero p { font-size: 1.1rem; color: rgba(255,255,255,0.5); font-style: italic; letter-spacing: 1px; }
    .github-status {
      max-width: 820px; margin: 0 auto 20px; display: flex; align-items: center; gap: 8px;
      font-size: 0.8rem; color: rgba(255,255,255,0.4);
    }
    .dot-status { width: 8px; height: 8px; border-radius: 50%; background: #ffd93d; animation: pulse 1.5s infinite; }
    .dot-status.ok { background: #6bcb77; animation: none; }
    .dot-status.err { background: #ff6b6b; animation: none; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .section { max-width: 820px; margin: 0 auto 28px; }
    .section-title { font-size: 0.78rem; text-transform: uppercase; letter-spacing: 2px; color: rgba(255,255,255,0.35); margin-bottom: 14px; padding-left: 2px; }
    .profiles-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
    @media (max-width: 600px) { .profiles-grid { grid-template-columns: repeat(2, 1fr); } .hero h1 { font-size: 1.7rem; } }
    .profile-card {
      background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.08);
      border-radius: 20px; padding: 20px 12px 16px; text-align: center;
      cursor: pointer; transition: all 0.25s ease; position: relative; user-select: none;
    }
    .profile-card:hover { background: rgba(255,255,255,0.1); transform: translateY(-3px); }
    .profile-card.active-user {
      border-color: var(--color);
      box-shadow: 0 0 0 3px rgba(255,255,255,0.1), 0 0 20px var(--color-glow);
    }
    .profile-avatar {
      width: 72px; height: 72px; border-radius: 50%; object-fit: cover;
      margin: 0 auto 10px; display: block;
      border: 3px solid rgba(255,255,255,0.15);
    }
    .profile-name { font-weight: 700; font-size: 1rem; margin-bottom: 6px; }
    .profile-badge {
      display: inline-block; font-size: 0.68rem; padding: 2px 8px;
      border-radius: 20px; background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.5);
      margin-bottom: 8px;
    }
    .profile-badge.done { background: rgba(107,203,119,0.2); color: #6bcb77; }
    .profile-dates-count { font-size: 0.75rem; color: rgba(255,255,255,0.3); }
    .you-label {
      position: absolute; top: 10px; right: 10px; font-size: 0.6rem;
      background: var(--color); color: #000; border-radius: 10px; padding: 2px 6px;
      font-weight: 800; letter-spacing: 1px;
    }
    .calendar-wrap {
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px; padding: 20px; margin-top: 10px;
    }
    .calendar-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .calendar-header h3 { font-size: 1rem; font-weight: 700; text-transform: capitalize; }
    .cal-nav { background: rgba(255,255,255,0.08); border: none; color: #fff; border-radius: 10px; width: 32px; height: 32px; cursor: pointer; font-size: 1rem; transition: background 0.2s; }
    .cal-nav:hover { background: rgba(255,255,255,0.18); }
    .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; text-align: center; }
    .cal-day-name { font-size: 0.65rem; color: rgba(255,255,255,0.3); padding: 4px 0; text-transform: uppercase; letter-spacing: 1px; }
    .cal-day {
      aspect-ratio: 1; border-radius: 10px; display: flex; align-items: center; justify-content: center;
      font-size: 0.82rem; cursor: pointer; transition: all 0.15s; border: 1.5px solid transparent;
      background: rgba(255,255,255,0.03);
    }
    .cal-day:hover:not(.empty):not(.past) { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2); }
    .cal-day.empty { cursor: default; background: transparent; }
    .cal-day.past { opacity: 0.2; cursor: not-allowed; }
    .cal-day.selected { background: var(--sel-color, #4d96ff); border-color: var(--sel-color, #4d96ff); color: #fff; font-weight: 700; }
    .cal-day.others-selected { border-color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.06); }
    .cal-day.all-selected { background: linear-gradient(135deg, #6bcb77, #4d96ff); border-color: #6bcb77; color: #fff; font-weight: 900; }
    .dot-row { display: flex; gap: 2px; justify-content: center; margin-top: 2px; flex-wrap: wrap; }
    .dot { width: 4px; height: 4px; border-radius: 50%; }
    .save-btn {
      width: 100%; margin-top: 16px; padding: 14px; border-radius: 14px; border: none;
      background: linear-gradient(90deg, #4d96ff, #6bcb77); color: #fff; font-weight: 800;
      font-size: 1rem; cursor: pointer; letter-spacing: 1px; transition: opacity 0.2s, transform 0.2s;
    }
    .save-btn:hover { opacity: 0.85; transform: translateY(-2px); }
    .save-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .summary-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 10px; }
    .summary-pill {
      background: rgba(107,203,119,0.12); border: 1px solid rgba(107,203,119,0.3);
      border-radius: 12px; padding: 10px 14px; display: flex; justify-content: space-between; align-items: center;
    }
    .pill-date { font-size: 0.82rem; color: rgba(255,255,255,0.8); }
    .pill-count { font-size: 0.75rem; font-weight: 700; color: #6bcb77; }
    .gallery-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    @media (max-width: 500px) { .gallery-grid { grid-template-columns: repeat(2, 1fr); } }
    .gallery-slot { border-radius: 14px; overflow: hidden; aspect-ratio: 4/3; }
    .gallery-slot img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.3s; }
    .gallery-slot img:hover { transform: scale(1.04); }
    .share-btn {
      display: flex; align-items: center; gap: 8px; margin: 0 auto;
      padding: 13px 28px; border-radius: 14px; border: none;
      background: linear-gradient(90deg, #25D366, #128C7E); color: #fff;
      font-weight: 800; font-size: 0.95rem; cursor: pointer; letter-spacing: 0.5px;
      transition: opacity 0.2s, transform 0.2s;
    }
    .share-btn:hover { opacity: 0.85; transform: translateY(-2px); }
    .toast {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: rgba(30,30,50,0.97); border: 1px solid rgba(255,255,255,0.12);
      color: #fff; padding: 12px 24px; border-radius: 14px; font-size: 0.9rem;
      opacity: 0; pointer-events: none; transition: all 0.3s; z-index: 999; white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<div class="hero">
  <h1>🌴 Vacances Dream Team</h1>
  <p>Cet été, on s'envoie en enfer</p>
</div>

<div class="github-status" id="github-status">
  <div class="dot-status" id="status-dot"></div>
  <span id="github-status-text">Connexion à GitHub...</span>
</div>

<div class="section">
  <div class="section-title">T'es qui ?</div>
  <div class="profiles-grid" id="profiles-grid"></div>
</div>

<div class="section" id="calendar-section" style="display:none">
  <div class="section-title" id="calendar-title">📅 Tes dispos — Août 2026</div>
  <div class="calendar-wrap">
    <div class="calendar-header">
      <button class="cal-nav" id="cal-prev">‹</button>
      <h3 id="cal-month-label"></h3>
      <button class="cal-nav" id="cal-next">›</button>
    </div>
    <div class="calendar-grid" id="calendar-grid"></div>
    <button class="save-btn" id="save-btn" onclick="saveDates()">💾 Sauvegarder mes dates</button>
  </div>
</div>

<div class="section">
  <div class="section-title">✅ Dates où tout le monde est dispo</div>
  <div id="summary-container"><div style="color:rgba(255,255,255,0.3);font-size:0.85rem">Sélectionnez vos dates pour voir les correspondances…</div></div>
</div>

<div class="section">
  <div class="section-title">📸 Nos souvenirs</div>
  <div class="gallery-grid" id="gallery-grid"></div>
</div>

<div class="section" style="text-align:center">
  <button class="share-btn" onclick="shareLink()">
    <span>📲</span> Partager le lien à la team
  </button>
</div>

<div class="toast" id="toast"></div>

<script>
const REPO_OWNER = 'Quentib';
const REPO_NAME  = 'vacances-dream-team';
const FILE_PATH  = 'dates.json';
const GH_TOKEN   = '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';
const RAW        = `https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/main/`;

const PEOPLE = [
  { name: 'Quentin', color: '#4d96ff', glow: 'rgba(77,150,255,0.4)', photo: RAW + 'Quentin.jpeg' },
  { name: 'Gabriel', color: '#ff6b6b', glow: 'rgba(255,107,107,0.4)', photo: RAW + 'Gabriel.jpeg' },
  { name: 'Mathis',  color: '#ffd93d', glow: 'rgba(255,217,61,0.4)',  photo: RAW + 'Mathis.jpeg'  },
  { name: 'Vincent', color: '#6bcb77', glow: 'rgba(107,203,119,0.4)', photo: RAW + 'Vincent.jpeg' },
];

const GALLERY_PHOTOS = [
  RAW + 'Vincent%20Mathis.jpeg',
  RAW + 'Pool%20party.jpeg',
  RAW + 'Muscle%20Vincent.jpeg',
  RAW + 'Mathis%20et%20Gabriel.jpeg',
  RAW + 'La%20Dream%20Team.jpeg',
  RAW + 'Resto.jpeg',
];

let currentUser  = null;
let selections   = {};
let fileSha      = null;
let calYear      = 2026;
let calMonth     = 7; // 0-indexed = août

// ─── GITHUB ───
async function ghGet() {
  const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`;
  const r = await fetch(url, { headers: { Authorization: `token ${GH_TOKEN}`, Accept: 'application/vnd.github.v3+json' }});
  if (!r.ok) throw new Error('GET failed');
  const json = await r.json();
  fileSha = json.sha;
  return JSON.parse(atob(json.content.replace(/\n/g,'')));
}

async function ghPut(data) {
  const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`;
  const body = { message: `Update dispos`, content: btoa(JSON.stringify(data, null, 2)), sha: fileSha };
  const r = await fetch(url, { method: 'PUT', headers: { Authorization: `token ${GH_TOKEN}`, 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
  if (!r.ok) throw new Error('PUT failed');
  const json = await r.json();
  fileSha = json.content.sha;
}

// ─── INIT ───
async function init() {
  setStatus('loading');
  try {
    const data = await ghGet();
    selections = data.selections || {};
    setStatus('ok');
  } catch(e) {
    setStatus('err');
  }
  renderProfiles();
  renderGallery();
  renderSummary();
}

function setStatus(s) {
  const dot  = document.getElementById('status-dot');
  const text = document.getElementById('github-status-text');
  dot.className = 'dot-status ' + s;
  if (s === 'loading') text.textContent = 'Connexion à GitHub…';
  if (s === 'ok')      text.textContent = 'Synchronisé avec GitHub ✓';
  if (s === 'err')     text.textContent = 'Hors ligne — vérifiez le token/dates.json';
}

// ─── PROFILES ───
function renderProfiles() {
  const grid = document.getElementById('profiles-grid');
  grid.innerHTML = '';
  PEOPLE.forEach(p => {
    const hasDates = (selections[p.name] || []).length > 0;
    const isMe = currentUser && currentUser.name === p.name;
    const card = document.createElement('div');
    card.className = 'profile-card' + (isMe ? ' active-user' : '');
    card.style.setProperty('--color', p.color);
    card.style.setProperty('--color-glow', p.glow);
    card.innerHTML = `
      ${isMe ? '<span class="you-label">TOI</span>' : ''}
      <img class="profile-avatar" src="${p.photo}" alt="${p.name}" />
      <div class="profile-name">${p.name}</div>
      <div class="profile-badge ${hasDates ? 'done' : ''}">${hasDates ? '✅ Dispo renseignée' : '⏳ En attente'}</div>
      <div class="profile-dates-count">${(selections[p.name]||[]).length} jour(s) sélectionné(s)</div>
    `;
    card.onclick = () => selectUser(p);
    grid.appendChild(card);
  });
}

function selectUser(p) {
  currentUser = p;
  document.getElementById('calendar-section').style.display = 'block';
  document.getElementById('calendar-title').textContent = `📅 ${p.name} — tes dispos en août 2026`;
  document.getElementById('calendar-section').scrollIntoView({ behavior: 'smooth' });
  renderCalendar();
  renderProfiles();
}

// ─── CALENDAR ───
function renderCalendar() {
  const label = document.getElementById('cal-month-label');
  const grid  = document.getElementById('calendar-grid');
  const date  = new Date(calYear, calMonth, 1);
  label.textContent = date.toLocaleDateString('fr-FR', { month: 'long', year: 'numeric' });

  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
  let startDay = date.getDay(); // 0=dim
  startDay = startDay === 0 ? 6 : startDay - 1; // lundi=0

  const myDates   = new Set(selections[currentUser.name] || []);
  const today     = new Date(); today.setHours(0,0,0,0);

  const dayNames = ['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
  grid.innerHTML = '';
  dayNames.forEach(d => { grid.innerHTML += `<div class="cal-day-name">${d}</div>`; });

  for (let i = 0; i < startDay; i++) grid.innerHTML += `<div class="cal-day empty"></div>`;

  for (let d = 1; d <= daysInMonth; d++) {
    const key  = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const thisDate = new Date(calYear, calMonth, d);
    const isPast   = thisDate < today;
    const isMine   = myDates.has(key);
    const othersCount = PEOPLE.filter(p => p.name !== currentUser.name && (selections[p.name]||[]).includes(key)).length;
    const isAll    = isMine && othersCount === PEOPLE.length - 1;

    let cls = 'cal-day';
    if (isPast)  cls += ' past';
    else if (isAll)   cls += ' all-selected';
    else if (isMine)  cls += ' selected';
    else if (othersCount > 0) cls += ' others-selected';

    const dots = PEOPLE.filter(p => p.name !== currentUser.name && (selections[p.name]||[]).includes(key))
      .map(p => `<div class="dot" style="background:${p.color}"></div>`).join('');

    const div = document.createElement('div');
    div.className = cls;
    div.style.setProperty('--sel-color', currentUser.color);
    div.innerHTML = `${d}${dots ? `<div class="dot-row">${dots}</div>` : ''}`;
    if (!isPast) div.onclick = () => toggleDay(key);
    grid.appendChild(div);
  }
}

function toggleDay(key) {
  const arr = selections[currentUser.name] || [];
  const idx = arr.indexOf(key);
  if (idx >= 0) arr.splice(idx, 1); else arr.push(key);
  selections[currentUser.name] = arr;
  renderCalendar();
  renderSummary();
  renderProfiles();
}

document.getElementById('cal-prev').onclick = () => { calMonth--; if (calMonth < 0) { calMonth = 11; calYear--; } renderCalendar(); };
document.getElementById('cal-next').onclick = () => { calMonth++; if (calMonth > 11) { calMonth = 0; calYear++; } renderCalendar(); };

// ─── SAVE ───
async function saveDates() {
  if (!currentUser) return;
  const btn = document.getElementById('save-btn');
  btn.disabled = true; btn.textContent = '⏳ Sauvegarde en cours…';
  try {
    await ghPut({ selections });
    showToast(`✅ Dates de ${currentUser.name} sauvegardées sur GitHub !`);
    btn.textContent = '✅ Sauvegardé !';
    setTimeout(() => { btn.disabled = false; btn.textContent = '💾 Sauvegarder mes dates'; }, 3000);
  } catch(e) {
    showToast('❌ Erreur de sauvegarde — vérifie le token');
    btn.disabled = false; btn.textContent = '💾 Sauvegarder mes dates';
  }
}

// ─── SUMMARY ───
function renderSummary() {
  const container = document.getElementById('summary-container');
  const allDates  = new Set(PEOPLE.flatMap(p => selections[p.name] || []));
  const matches   = [];
  allDates.forEach(key => {
    if (PEOPLE.every(p => (selections[p.name]||[]).includes(key))) matches.push(key);
  });
  matches.sort();
  if (matches.length === 0) {
    container.innerHTML = '<div style="color:rgba(255,255,255,0.3);font-size:0.85rem">Aucune date commune pour l\'instant…</div>';
    return;
  }
  container.innerHTML = '<div class="summary-grid">' + matches.map(key => {
    const [y,m,d] = key.split('-');
    const label = new Date(+y,+m-1,+d).toLocaleDateString('fr-FR',{ weekday:'short', day:'numeric', month:'long', year:'numeric' });
    return `<div class="summary-pill"><span class="pill-date">${label}</span><span class="pill-count">4/4 🟢</span></div>`;
  }).join('') + '</div>';
}

// ─── GALLERY ───
function renderGallery() {
  const grid = document.getElementById('gallery-grid');
  grid.innerHTML = GALLERY_PHOTOS.map(src =>
    `<div class="gallery-slot"><img src="${src}" alt="souvenir" loading="lazy" /></div>`
  ).join('');
}

// ─── SHARE ───
function shareLink() {
  const url = window.location.href;
  navigator.clipboard.writeText(url).then(() => {
    showToast('🔗 Lien copié ! Colle-le sur WhatsApp 📱');
  }).catch(() => { prompt('Copie ce lien :', url); });
}

// ─── TOAST ───
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3200);
}

init();
</script>
</body>
</html>
