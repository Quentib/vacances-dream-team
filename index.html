<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🌴 Vacances Dream Team</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(160deg, #0a0a0a 0%, #1a1a2e 40%, #16213e 70%, #0f3460 100%);
      min-height: 100vh;
      padding: 32px 16px 60px;
      color: #fff;
    }

    .hero { text-align: center; margin-bottom: 40px; }
    .hero h1 {
      font-size: 2.4rem; font-weight: 900; letter-spacing: 2px;
      background: linear-gradient(90deg, #ff6b6b, #ffd93d, #6bcb77, #4d96ff);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; margin-bottom: 8px;
    }
    .hero p { font-size: 1.1rem; color: rgba(255,255,255,0.5); font-style: italic; letter-spacing: 1px; }

    .section { max-width: 820px; margin: 0 auto 28px; }
    .section-title { font-size: 0.78rem; text-transform: uppercase; letter-spacing: 2px; color: rgba(255,255,255,0.35); margin-bottom: 14px; padding-left: 2px; }

    .profiles-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
    @media (max-width: 600px) { .profiles-grid { grid-template-columns: repeat(2, 1fr); } .hero h1 { font-size: 1.7rem; } }

    .profile-card {
      background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.08);
      border-radius: 20px; padding: 20px 12px 16px; text-align: center;
      cursor: pointer; transition: all 0.25s ease; position: relative; user-select: none;
    }
    .profile-card:hover { background: rgba(255,255,255,0.1); transform: translateY(-3px); }
    .profile-card.selected {
      border-color: var(--color); background: rgba(255,255,255,0.1);
      box-shadow: 0 0 28px -4px var(--color), inset 0 0 24px -12px var(--color);
      transform: translateY(-4px);
    }
    .profile-card.selected::after {
      content: '✓'; position: absolute; top: -10px; right: -10px;
      width: 26px; height: 26px; background: var(--color); border-radius: 50%;
      font-size: 0.8rem; font-weight: 900; display: flex; align-items: center;
      justify-content: center; color: #000; line-height: 26px;
    }
    .avatar-wrap { position: relative; width: 80px; height: 80px; margin: 0 auto 12px; }
    .avatar-img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 3px solid var(--color); display: block; }
    .avatar-initial {
      width: 80px; height: 80px; border-radius: 50%;
      background: linear-gradient(135deg, var(--color), var(--color-dark));
      border: 3px solid var(--color); display: flex; align-items: center;
      justify-content: center; font-size: 2rem; font-weight: 900;
      color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.4);
    }
    .change-photo-btn {
      position: absolute; bottom: -4px; right: -4px; width: 26px; height: 26px;
      background: rgba(20,20,40,0.95); border: 2px solid var(--color); border-radius: 50%;
      font-size: 0.75rem; cursor: pointer; display: flex; align-items: center;
      justify-content: center; transition: transform 0.2s; z-index: 2;
    }
    .change-photo-btn:hover { transform: scale(1.2); }
    .profile-name { font-weight: 700; font-size: 1rem; color: #fff; }
    .profile-days { font-size: 0.75rem; color: rgba(255,255,255,0.4); margin-top: 4px; }
    .profile-color-bar { width: 40px; height: 4px; border-radius: 2px; background: var(--color); margin: 8px auto 0; }
    .file-input { display: none; }

    .calendar-wrap { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 20px; }
    .cal-month { text-align: center; font-weight: 700; font-size: 1rem; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.55); margin-bottom: 14px; }
    .cal-header { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 6px; }
    .cal-header span { text-align: center; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: rgba(255,255,255,0.3); padding: 4px 0; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }

    .day {
      aspect-ratio: 1; border-radius: 10px; display: flex; flex-direction: column;
      align-items: center; justify-content: center; font-size: 0.85rem; font-weight: 600;
      cursor: pointer; transition: all 0.18s ease; position: relative;
      background: rgba(255,255,255,0.04); border: 1.5px solid transparent; color: rgba(255,255,255,0.6);
    }
    .day:hover { background: rgba(255,255,255,0.1); }
    .day.empty { background: transparent; cursor: default; pointer-events: none; }
    .day.past { opacity: 0.35; cursor: default; pointer-events: none; }
    .day.today { border-color: rgba(255,255,255,0.4); color: #fff; }
    .day.selected-day { border-color: var(--active-color, #4d96ff); background: rgba(77,150,255,0.15); color: #fff; }
    .day.full-match { background: rgba(107,203,119,0.2); border-color: #6bcb77; color: #fff; }
    .day-dots { display: flex; gap: 2px; margin-top: 2px; flex-wrap: wrap; justify-content: center; max-width: 32px; }
    .day-dot { width: 5px; height: 5px; border-radius: 50%; }

    .summary-pills { display: flex; flex-wrap: wrap; gap: 10px; }
    .summary-pill {
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 30px; padding: 8px 16px; display: flex; align-items: center; gap: 10px;
      font-size: 0.85rem;
    }
    .pill-date { color: rgba(255,255,255,0.7); }
    .pill-count { color: #6bcb77; font-weight: 700; }

    .gallery-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    @media (max-width: 500px) { .gallery-grid { grid-template-columns: repeat(2, 1fr); } }
    .gallery-slot {
      aspect-ratio: 1; border-radius: 16px; background: rgba(255,255,255,0.04);
      border: 2px dashed rgba(255,255,255,0.12); display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 6px; cursor: pointer;
      transition: all 0.2s; font-size: 0.75rem; color: rgba(255,255,255,0.3);
      overflow: hidden; position: relative;
    }
    .gallery-slot:hover { border-color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.08); }
    .gallery-slot.drag-over { border-color: #4d96ff; background: rgba(77,150,255,0.1); }
    .gallery-slot.has-photo { border-style: solid; border-color: rgba(255,255,255,0.15); cursor: default; }
    .gallery-slot img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .gallery-remove {
      position: absolute; top: 6px; right: 6px; width: 22px; height: 22px;
      background: rgba(0,0,0,0.7); border-radius: 50%; font-size: 0.65rem;
      display: flex; align-items: center; justify-content: center; cursor: pointer;
      opacity: 0; transition: opacity 0.2s; color: #fff;
    }
    .gallery-slot:hover .gallery-remove { opacity: 1; }
    .add-icon { font-size: 1.8rem; }

    #toast {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: rgba(30,30,50,0.95); border: 1px solid rgba(255,255,255,0.15);
      color: #fff; padding: 12px 24px; border-radius: 40px; font-size: 0.9rem;
      opacity: 0; transition: all 0.3s ease; pointer-events: none; z-index: 999; white-space: nowrap;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .sync-bar {
      text-align: center; font-size: 0.75rem; color: rgba(255,255,255,0.3);
      margin-bottom: 20px; letter-spacing: 1px;
    }
    .sync-bar span { color: #6bcb77; }
  </style>
</head>
<body>

<div class="hero">
  <h1>🌴 Vacances Dream Team</h1>
  <p>Trouvez les dates parfaites ensemble</p>
</div>

<div class="sync-bar" id="sync-bar">Synchronisation… ⏳</div>

<div class="section">
  <div class="section-title">👥 Qui es-tu ?</div>
  <div class="profiles-grid" id="profiles-grid"></div>
</div>

<div class="section" id="cal-section" style="display:none">
  <div class="section-title">📅 Tes disponibilités — <span id="active-name"></span></div>
  <div class="calendar-wrap">
    <div class="cal-month" id="cal-month"></div>
    <div class="cal-header">
      <span>Lu</span><span>Ma</span><span>Me</span><span>Je</span><span>Ve</span><span>Sa</span><span>Di</span>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
  </div>
</div>

<div class="section">
  <div class="section-title">🟢 Dates où tout le monde est dispo</div>
  <div class="summary-pills" id="summary-pills"></div>
</div>

<div class="section">
  <div class="section-title">📸 Galerie souvenirs</div>
  <div class="gallery-grid" id="gallery-grid"></div>
</div>

<input type="file" id="global-file-input" class="file-input" accept="image/*" />
<input type="file" id="gallery-file-input" class="file-input" accept="image/*" multiple />

<div id="toast"></div>

<script>
// ─────────────────────────────────────────
// CONFIG GITHUB
// ─────────────────────────────────────────
const GH_OWNER  = 'Quentib';
const GH_REPO   = 'vacances-dream-team';
const GH_TOKEN  = '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';
const GH_FILE   = 'dates.json';
const GH_BRANCH = 'main';

// ─────────────────────────────────────────
// PARTICIPANTS
// ─────────────────────────────────────────
const PEOPLE = [
  { name: 'Quentin', color: '#ff6b6b', colorDark: '#c0392b' },
  { name: 'Théo',    color: '#ffd93d', colorDark: '#b7950b' },
  { name: 'Amine',   color: '#6bcb77', colorDark: '#1e8449' },
  { name: 'Rayan',   color: '#4d96ff', colorDark: '#1a5276' },
];

// ─────────────────────────────────────────
// STATE
// ─────────────────────────────────────────
let activeIndex    = null;
let selections     = {};   // { "Quentin": ["2025-07-10", ...], ... }
let profilePhotos  = {};
let galleryPhotos  = [];
let pendingPhotoTarget = null;
let ghFileSha      = null;

PEOPLE.forEach(p => selections[p.name] = []);

// ─────────────────────────────────────────
// GITHUB API
// ─────────────────────────────────────────
async function ghLoad() {
  try {
    const r = await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${GH_FILE}?ref=${GH_BRANCH}`, {
      headers: { Authorization: `token ${GH_TOKEN}`, Accept: 'application/vnd.github.v3+json' }
    });
    if (!r.ok) throw new Error('Fichier introuvable');
    const json = await r.json();
    ghFileSha = json.sha;
    const data = JSON.parse(atob(json.content.replace(/\n/g, '')));
    if (data.selections) selections = data.selections;
    PEOPLE.forEach(p => { if (!selections[p.name]) selections[p.name] = []; });
    document.getElementById('sync-bar').innerHTML = 'Synchronisé avec GitHub ✅ <span>' + new Date().toLocaleTimeString('fr-FR') + '</span>';
  } catch(e) {
    document.getElementById('sync-bar').innerHTML = '⚠️ Impossible de charger depuis GitHub';
    console.error(e);
  }
}

async function ghSave() {
  document.getElementById('sync-bar').innerHTML = 'Sauvegarde… ⏳';
  try {
    const content = btoa(unescape(encodeURIComponent(JSON.stringify({ selections }, null, 2))));
    const body = { message: 'MAJ disponibilités', content, branch: GH_BRANCH };
    if (ghFileSha) body.sha = ghFileSha;
    const r = await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${GH_FILE}`, {
      method: 'PUT',
      headers: { Authorization: `token ${GH_TOKEN}`, Accept: 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (!r.ok) throw new Error(await r.text());
    const json = await r.json();
    ghFileSha = json.content.sha;
    document.getElementById('sync-bar').innerHTML = 'Synchronisé avec GitHub ✅ <span>' + new Date().toLocaleTimeString('fr-FR') + '</span>';
    showToast('✅ Sauvegardé !');
  } catch(e) {
    document.getElementById('sync-bar').innerHTML = '⚠️ Erreur de sauvegarde';
    showToast('❌ Erreur de sauvegarde');
    console.error(e);
  }
}

// ─────────────────────────────────────────
// LOCAL STORAGE (photos uniquement)
// ─────────────────────────────────────────
function saveStorage() {
  localStorage.setItem('vdt_photos', JSON.stringify(profilePhotos));
  localStorage.setItem('vdt_gallery', JSON.stringify(galleryPhotos));
}
function loadStorage() {
  try { profilePhotos = JSON.parse(localStorage.getItem('vdt_photos') || '{}'); } catch(e) { profilePhotos = {}; }
  try { galleryPhotos = JSON.parse(localStorage.getItem('vdt_gallery') || '[]'); } catch(e) { galleryPhotos = []; }
}

// ─────────────────────────────────────────
// INIT
// ─────────────────────────────────────────
async function init() {
  loadStorage();
  renderProfiles();
  renderGallery();
  await ghLoad();
  renderProfiles();
  renderSummary();
}

// ─────────────────────────────────────────
// PROFILES
// ─────────────────────────────────────────
function renderProfiles() {
  const grid = document.getElementById('profiles-grid');
  grid.innerHTML = '';
  PEOPLE.forEach((p, i) => {
    const card = document.createElement('div');
    card.className = 'profile-card' + (activeIndex === i ? ' selected' : '');
    card.style.setProperty('--color', p.color);
    card.style.setProperty('--color-dark', p.colorDark);
    const photo = profilePhotos[p.name.toLowerCase()];
    const avatarHTML = photo
      ? `<img class="avatar-img" src="${photo}" alt="${p.name}" />`
      : `<div class="avatar-initial">${p.name[0]}</div>`;
    const days = selections[p.name] ? selections[p.name].length : 0;
    card.innerHTML = `
      <div class="avatar-wrap">
        ${avatarHTML}
        <div class="change-photo-btn" title="Changer la photo">📷</div>
      </div>
      <div class="profile-name">${p.name}</div>
      <div class="profile-days">${days} jour${days>1?'s':''} sélectionné${days>1?'s':''}</div>
      <div class="profile-color-bar"></div>
    `;
    card.querySelector('.change-photo-btn').addEventListener('click', e => {
      e.stopPropagation();
      pendingPhotoTarget = 'profile_' + i;
      document.getElementById('global-file-input').click();
    });
    card.addEventListener('click', () => selectProfile(i));
    grid.appendChild(card);
  });
}

function selectProfile(i) {
  activeIndex = (activeIndex === i) ? null : i;
  renderProfiles();
  const sec = document.getElementById('cal-section');
  if (activeIndex !== null) {
    sec.style.display = 'block';
    document.getElementById('active-name').textContent = PEOPLE[activeIndex].name;
    document.documentElement.style.setProperty('--active-color', PEOPLE[activeIndex].color);
    renderCalendar();
  } else {
    sec.style.display = 'none';
  }
}

// ─────────────────────────────────────────
// CALENDAR
// ─────────────────────────────────────────
const YEAR = 2025;
const MONTH = 6; // juillet (0-indexé)

function renderCalendar() {
  if (activeIndex === null) return;
  const person = PEOPLE[activeIndex];
  const myDates = selections[person.name];
  const monthNames = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  document.getElementById('cal-month').textContent = `${monthNames[MONTH]} ${YEAR}`;
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';
  const firstDay = new Date(YEAR, MONTH, 1).getDay();
  const offset = (firstDay === 0) ? 6 : firstDay - 1;
  const daysInMonth = new Date(YEAR, MONTH + 1, 0).getDate();
  const today = new Date(); today.setHours(0,0,0,0);
  for (let i = 0; i < offset; i++) {
    const e = document.createElement('div'); e.className = 'day empty'; grid.appendChild(e);
  }
  for (let d = 1; d <= daysInMonth; d++) {
    const date = new Date(YEAR, MONTH, d);
    const key = `${YEAR}-${String(MONTH+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const cell = document.createElement('div');
    cell.className = 'day';
    const isPast = date < today;
    const isToday = date.getTime() === today.getTime();
    const isMine = myDates.includes(key);
    const allCount = PEOPLE.filter(p => selections[p.name] && selections[p.name].includes(key)).length;
    const isFull = allCount === PEOPLE.length;
    if (isPast) cell.classList.add('past');
    if (isToday) cell.classList.add('today');
    if (isMine) cell.classList.add('selected-day');
    if (isFull) cell.classList.add('full-match');
    cell.style.setProperty('--active-color', person.color);
    const dots = PEOPLE.filter(p => selections[p.name] && selections[p.name].includes(key))
      .map(p => `<div class="day-dot" style="background:${p.color}"></div>`).join('');
    cell.innerHTML = `${d}<div class="day-dots">${dots}</div>`;
    if (!isPast) cell.addEventListener('click', () => toggleDay(key));
    grid.appendChild(cell);
  }
}

function toggleDay(key) {
  if (activeIndex === null) return;
  const name = PEOPLE[activeIndex].name;
  const arr = selections[name];
  const idx = arr.indexOf(key);
  if (idx >= 0) arr.splice(idx, 1);
  else arr.push(key);
  renderCalendar();
  renderProfiles();
  renderSummary();
  ghSave();
}

// ─────────────────────────────────────────
// SUMMARY
// ─────────────────────────────────────────
function renderSummary() {
  const container = document.getElementById('summary-pills');
  const allDates = new Set(PEOPLE.flatMap(p => selections[p.name] || []));
  const matches = [];
  allDates.forEach(key => {
    const count = PEOPLE.filter(p => selections[p.name] && selections[p.name].includes(key)).length;
    if (count === PEOPLE.length) matches.push(key);
  });
  matches.sort();
  if (matches.length === 0) {
    container.innerHTML = '<div style="color:rgba(255,255,255,0.3);font-size:0.85rem">Aucune date commune pour l\'instant…</div>';
    return;
  }
  container.innerHTML = '';
  matches.forEach(key => {
    const [y,m,d] = key.split('-');
    const date = new Date(+y, +m-1, +d);
    const label = date.toLocaleDateString('fr-FR', { weekday:'short', day:'numeric', month:'long' });
    const max = PEOPLE.filter(p => selections[p.name] && selections[p.name].includes(key)).length;
    container.innerHTML += `<div class="summary-pill"><span class="pill-date">${label}</span><span class="pill-count">${max}/${PEOPLE.length} 🟢</span></div>`;
  });
}

// ─────────────────────────────────────────
// GALLERY
// ─────────────────────────────────────────
const MAX_GALLERY = 6;

function renderGallery() {
  const grid = document.getElementById('gallery-grid');
  grid.innerHTML = '';
  galleryPhotos.forEach((src, i) => {
    const slot = document.createElement('div');
    slot.className = 'gallery-slot has-photo';
    slot.innerHTML = `<img src="${src}" alt="souvenir" /><div class="gallery-remove" onclick="removeGalleryPhoto(${i})">✕</div>`;
    grid.appendChild(slot);
  });
  const remaining = MAX_GALLERY - galleryPhotos.length;
  for (let i = 0; i < remaining; i++) {
    const slot = document.createElement('div');
    slot.className = 'gallery-slot';
    slot.innerHTML = `<div class="add-icon">📷</div><span>Glisse une photo</span>`;
    slot.onclick = () => { pendingPhotoTarget = 'gallery'; document.getElementById('gallery-file-input').click(); };
    slot.addEventListener('dragover', e => { e.preventDefault(); slot.classList.add('drag-over'); });
    slot.addEventListener('dragleave', () => slot.classList.remove('drag-over'));
    slot.addEventListener('drop', e => { e.preventDefault(); slot.classList.remove('drag-over'); const f = e.dataTransfer.files[0]; if (f && f.type.startsWith('image/')) readFileAsGallery(f); });
    grid.appendChild(slot);
  }
}

function removeGalleryPhoto(idx) { galleryPhotos.splice(idx, 1); saveStorage(); renderGallery(); }

function readFileAsGallery(file) {
  const reader = new FileReader();
  reader.onload = e => { galleryPhotos.push(e.target.result); saveStorage(); renderGallery(); showToast('📸 Photo ajoutée !'); };
  reader.readAsDataURL(file);
}

// ─────────────────────────────────────────
// FILE INPUTS
// ─────────────────────────────────────────
function setupFileInputs() {
  document.getElementById('global-file-input').addEventListener('change', function() {
    const file = this.files[0]; if (!file) return;
    if (pendingPhotoTarget && pendingPhotoTarget.startsWith('profile_')) {
      const idx = parseInt(pendingPhotoTarget.split('_')[1]);
      const reader = new FileReader();
      reader.onload = e => { profilePhotos[PEOPLE[idx].name.toLowerCase()] = e.target.result; saveStorage(); renderProfiles(); showToast(`📸 Photo de ${PEOPLE[idx].name} mise à jour !`); };
      reader.readAsDataURL(file);
    }
    this.value = '';
  });
  document.getElementById('gallery-file-input').addEventListener('change', function() {
    [...this.files].forEach(readFileAsGallery); this.value = '';
  });
  document.getElementById('profiles-grid').addEventListener('dragover', e => e.preventDefault());
  document.getElementById('profiles-grid').addEventListener('drop', e => {
    e.preventDefault();
    const file = e.dataTransfer.files[0];
    if (!file || !file.type.startsWith('image/')) return;
    const card = e.target.closest('.profile-card');
    if (!card) return;
    const idx = [...document.querySelectorAll('.profile-card')].indexOf(card);
    if (idx < 0) return;
    const reader = new FileReader();
    reader.onload = ev => { profilePhotos[PEOPLE[idx].name.toLowerCase()] = ev.target.result; saveStorage(); renderProfiles(); showToast(`📸 Photo de ${PEOPLE[idx].name} mise à jour !`); };
    reader.readAsDataURL(file);
  });
}

// ─────────────────────────────────────────
// TOAST
// ─────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3200);
}

init();
setupFileInputs();
</script>
</body>
</html>
